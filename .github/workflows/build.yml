name: Build VLC (Wiki Precision Implementation)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Wiki推奨のビルドオプション
      MAKEFLAGS: "-j2"
      USE_CCACHE: "1"
      CCACHE_DIR: "/home/runner/.cache/ccache"

    steps:
      - name: Allocate Swap (8GB)
        run: |
          sudo fallocate -l 8G /swapfile_vlc || sudo dd if=/dev/zero of=/swapfile_vlc bs=1M count=8192
          sudo chmod 600 /swapfile_vlc
          sudo mkswap /swapfile_vlc
          sudo swapon /swapfile_vlc

      - name: Checkout Source (Submodules Recursive)
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Wiki Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y automake ant autopoint cmake build-essential libtool-bin \
            patch pkg-config protobuf-compiler ragel subversion unzip git \
            flex python3 wget gperf nasm ccache meson ninja-build bison gawk gettext

      - name: Setup Wiki Build Environment
        run: |
          # Wikiが要求するNDKパスの解決
          # GitHub Runner上の NDK 27.x の絶対パスを確実に取得
          RAW_NDK_PATH=$(ls -d ${ANDROID_SDK_ROOT}/ndk/27.* | head -n 1)
          CLEAN_NDK_PATH=$(realpath "$RAW_NDK_PATH")
          
          echo "ANDROID_SDK=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK=$CLEAN_NDK_PATH" >> $GITHUB_ENV
          # Wikiによってはこの変数名を要求する場合がある
          echo "ANDROID_NDK_HOME=$CLEAN_NDK_PATH" >> $GITHUB_ENV
          
          # パスを通す
          echo "$CLEAN_NDK_PATH" >> $GITHUB_PATH

      - name: Build VLC for Android (ARM64)
        run: |
          git config --global user.email "worker@example.com"
          git config --global user.name "VLC Builder"
          
          # スクリプトの実行（Wikiの手順を再現）
          # 確実にパスが通っているかビルド直前にデバッグ出力
          echo "Building with ANDROID_NDK: $ANDROID_NDK"
          
          ./buildsystem/compile.sh -a arm64-v8a -r

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vlc-android-apk
          path: "**/*.apk"
