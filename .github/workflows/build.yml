name: Build VLC (Wiki Official Method)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Official Packages (from Wiki)
        run: |
          sudo apt-get update
          # Wikiに記載されているパッケージを全て網羅
          sudo apt-get install -y automake ant autopoint cmake build-essential libtool-bin \
            patch pkg-config protobuf-compiler ragel subversion unzip git \
            flex python3 wget gperf nasm

      - name: Set Android Environment (Wiki Requirement)
        run: |
          # GitHub標準のSDKパスをWikiが求める変数名に変換
          echo "ANDROID_SDK=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          # NDKはGitHubにプリインストールされている最新版を指定
          echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk-bundle" >> $GITHUB_ENV

      - name: Build Custom VLC
        run: |
          chmod +x compile.sh
          # Wikiの指示通り、アーキテクチャ(arm64)とリリースモード(-r)を指定
          ./compile.sh -a arm64-v8a -r

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vlc-custom-apk
          path: "**/*.apk"
