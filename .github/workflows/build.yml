name: Build VLC-Android (Node 24 & Modern Actions Optimized)

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]  # ここを追加：v1.0.0 などのタグに反応
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      USE_CCACHE: "1"
      CCACHE_DIR: "/home/runner/.cache/ccache"
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false"

    steps:
      # 1. インフラ強化（12GB Swap）
      - name: Allocate Massive Swap (12GB)
        run: |
          sudo fallocate -l 12G /swapfile_vlc || sudo dd if=/dev/zero of=/swapfile_vlc bs=1M count=12288
          sudo chmod 600 /swapfile_vlc
          sudo mkswap /swapfile_vlc
          sudo swapon /swapfile_vlc
          free -h

      # 2. ソース取得（Node 24対応最新版）
      - name: Checkout Source
        uses: actions/checkout@v6 # v5/v6を利用
        with:
          submodules: 'recursive'
          fetch-depth: 0

      # 3. Java設定（Node 24対応最新版）
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. NDK設定（r28b）
      - name: Setup Android NDK (r28b)
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r28b
          add-to-path: true

      # 5. 依存関係のインストール
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            automake ant autopoint cmake build-essential \
            libtool libtool-bin libltdl-dev m4 \
            patch pkg-config protobuf-compiler ragel subversion unzip git \
            flex python3 wget gperf nasm ccache meson ninja-build bison gawk gettext

      # 6. 環境構築
      - name: Setup Build Environment
        run: |
          NDK_ACTUAL_PATH="${{ steps.setup-ndk.outputs.ndk-path }}"
          sudo ln -sfn "$NDK_ACTUAL_PATH" "$ANDROID_SDK_ROOT/ndk-bundle"
          
          echo "ANDROID_SDK=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk-bundle" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk-bundle" >> $GITHUB_ENV

      # 7A. Gradleキャッシュ（Node 24対応最新版）
      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 7B. ccacheキャッシュ（Node 24対応最新版）
      - name: ccache cache
        uses: actions/cache@v5
        with:
          path: /home/runner/.cache/ccache
          key: vlc-ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            vlc-ccache-${{ runner.os }}-

      # 8. ビルド実行
      - name: Build VLC for Android (ARM64)
        run: |
          git config --global user.email "worker@example.com"
          git config --global user.name "VLC Builder"
          
          SCRIPT_PATH="./buildsystem/compile.sh"
          if [ ! -f "$SCRIPT_PATH" ]; then
            SCRIPT_PATH="./compile.sh"
          fi
          chmod +x "$SCRIPT_PATH"
          find . -name gradlew -exec chmod +x {} + || true
          
          $SCRIPT_PATH -a arm64-v8a -r

      # 9. 成果物アップロード (既存のステップ)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: vlc-custom-apk
          path: "**/*.apk"

      # 10. GitHub Releasesへの自動配送
      - name: Automatic Release Service
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') # タグが打たれた時だけ実行
        with:
          files: |
            **/*.apk
          name: "VLC Custom Build ${{ github.ref_name }}"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
