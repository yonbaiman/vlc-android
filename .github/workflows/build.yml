name: Build Custom VLC (The Masterpiece)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Official Dependencies (from Wiki)
        run: |
          sudo apt-get update
          sudo apt-get install -y automake ant autopoint cmake build-essential libtool-bin \
            patch pkg-config protobuf-compiler ragel subversion unzip git \
            flex python3 wget gperf nasm

      - name: Build Custom VLC
        run: |
          # 1. Gitの身分証明（パッチ適用エラー対策）
          git config --global user.email "worker@example.com"
          git config --global user.name "VLC Builder"

          # 2. NDKの場所を特定（308.jpg対策：最新のv27以降を狙い撃ち）
          export ANDROID_SDK=$ANDROID_SDK_ROOT
          # GitHubにあるNDKの中から最も新しいバージョンのパスを取得
          LATEST_NDK=$(ls -d $ANDROID_SDK_ROOT/ndk/* | sort -V | tail -n 1)
          export ANDROID_NDK=$LATEST_NDK
          
          echo "Using Android SDK: $ANDROID_SDK"
          echo "Using Android NDK: $ANDROID_NDK"

          # 3. 実行スクリプトと権限の自動修復（場所エラー対策）
          SCRIPT_PATH=$(find . -name compile.sh | head -n 1)
          echo "Found script at: $SCRIPT_PATH"
          chmod +x "$SCRIPT_PATH"
          # 内部で使われるgradlewもすべて実行可能にする
          find . -name gradlew -exec chmod +x {} +

          # 4. ビルド実行（Dimensity 9500 = arm64-v8a）
          # -r はリリースビルド（軽量・高速）
          $SCRIPT_PATH -a arm64-v8a -r

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vlc-custom-apk
          path: "**/*.apk"
          if-no-files-found: error
