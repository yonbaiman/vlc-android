name: Build Custom VLC (The Final Solution)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Build Custom VLC APK inside Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            registry.videolan.org/vlc-debian-android \
            bash -c "
              # 1. Java 17 をインストール
              apt-get update && apt-get install -y openjdk-17-jdk
              
              # 2. システム全体の標準Javaを強制的に17へ切り替え（299.jpgへの対策）
              update-alternatives --set java /usr/lib/jvm/java-17-openjdk-amd64/bin/java
              update-alternatives --set javac /usr/lib/jvm/java-17-openjdk-amd64/bin/javac
              
              # 3. 環境変数を定義（SDK/NDKの場所を教え、Javaのパスを通す）
              export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
              export ANDROID_SDK=/sdk
              export ANDROID_NDK=/sdk/android-ndk
              export PATH=\$JAVA_HOME/bin:\$PATH
              
              # 4. スクリプトを探して実行（場所がどこでも見つけ出す）
              SCRIPT_PATH=\$(find . -maxdepth 3 -name compile.sh | head -1)
              chmod +x \"\$SCRIPT_PATH\"
              ./\"\$SCRIPT_PATH\" -a arm64-v8a -r
            "

      - name: Upload Custom APK
        uses: actions/upload-artifact@v4
        with:
          name: vlc-custom-nplayer-style
          path: "**/*.apk"
          if-no-files-found: error
