name: Build Custom VLC (The Absolute Final Attempt)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Build Custom VLC APK inside Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            registry.videolan.org/vlc-debian-android \
            bash -c '
              # 1. Java 17を確実にインストール
              apt-get update && apt-get install -y openjdk-17-jdk-headless
              
              # 2. 【究極の自動化】Javaのバイナリから遡ってJAVA_HOMEを自動特定
              export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
              
              # 3. ログにパスを出して証拠を残す
              echo "Found JAVA_HOME at: $JAVA_HOME"
              
              # 4. その他の環境変数を同期
              export ANDROID_SDK=/sdk
              export ANDROID_NDK=/sdk/android-ndk
              export PATH=$JAVA_HOME/bin:$PATH
              
              # 5. compile.sh を探して実行（どんな階層でも見つける）
              SCRIPT_PATH=$(find . -maxdepth 3 -name compile.sh | head -1)
              chmod +x "$SCRIPT_PATH"
              ./"$SCRIPT_PATH" -a arm64-v8a -r
            '

      - name: Upload Custom APK
        uses: actions/upload-artifact@v4
        with:
          name: vlc-custom-nplayer-style
          path: "**/*.apk"
          if-no-files-found: error
