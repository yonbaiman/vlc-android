name: Build VLC (Free Tier Optimized)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 【インフラ最適化1】 OOM(メモリ不足)対策としてSwap領域を8GB追加（競合対策・堅牢化版）
      - name: Allocate Swap Space
        run: |
          echo "Current memory and swap status:"
          free -h
          
          # システム既存の /swapfile との競合を避けるため、独自ファイル名で作成
          # fallocateが失敗した場合はddコマンドで確実に作成するフェイルオーバーを実装
          sudo fallocate -l 8G /swapfile_vlc || sudo dd if=/dev/zero of=/swapfile_vlc bs=1M count=8192 status=progress
          
          sudo chmod 600 /swapfile_vlc
          sudo mkswap /swapfile_vlc
          sudo swapon /swapfile_vlc
          
          echo "New memory and swap status:"
          free -h

      # 【修正箇所】 VLC本体など、依存するサブモジュールも全て再帰的に取得する
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 【インフラ最適化2】 依存関係に最新のビルドツールとccacheを追加（構文エラー修正済み）
      - name: Install Official Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y automake ant autopoint cmake build-essential libtool-bin \
            patch pkg-config protobuf-compiler ragel subversion unzip git \
            flex python3 wget gperf nasm ccache \
            meson ninja-build bison gawk gettext default-jdk

      # 【インフラ最適化3】 GitHub Actionsのキャッシュ機構を利用してccacheを保存・復元
      - name: Setup ccache caching
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-vlc-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-vlc-ccache-

      - name: Configure ccache
        run: |
          ccache --max-size=5G
          ccache -z

      - name: Build Custom VLC
        run: |
          git config --global user.email "worker@example.com"
          git config --global user.name "VLC Builder"

          # NDKの設定
          export ANDROID_SDK=$ANDROID_SDK_ROOT
          NDK_PATH=$(ls -d $ANDROID_SDK_ROOT/ndk/27.* | head -n 1)
          export ANDROID_NDK=$NDK_PATH
          echo "Using Specified NDK: $ANDROID_NDK"

          # 【インフラ最適化4】 メモリ消費を抑えるため並列コンパイル数を2に制限し、ccacheを有効化
          export MAKEFLAGS="-j2"
          export USE_CCACHE=1
          export CCACHE_DIR=~/.cache/ccache

          SCRIPT_PATH=$(find . -name compile.sh | head -n 1)
          chmod +x "$SCRIPT_PATH"
          find . -name gradlew -exec chmod +x {} +

          # 実行
          $SCRIPT_PATH -a arm64-v8a -r

      # ccacheのヒット率を確認（次回以降のビルド短縮の指標）
      - name: Check ccache statistics
        run: ccache -s

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vlc-custom-apk
          path: "**/*.apk"
          if-no-files-found: error
