name: Build VLC-Android (Node 24 & Modern Actions Optimized)

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]  # ここを追加：v1.0.0 などのタグに反応
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      USE_CCACHE: "1"
      CCACHE_DIR: "/home/runner/.cache/ccache"
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false"

    steps:
      # 1. インフラ強化（12GB Swap）
      - name: Allocate Massive Swap (12GB)
        run: |
          sudo fallocate -l 12G /swapfile_vlc || sudo dd if=/dev/zero of=/swapfile_vlc bs=1M count=12288
          sudo chmod 600 /swapfile_vlc
          sudo mkswap /swapfile_vlc
          sudo swapon /swapfile_vlc
          free -h

      # 2. ソース取得（Node 24対応最新版）
      - name: Checkout Source
        uses: actions/checkout@v6 # v5/v6を利用
        with:
          submodules: 'recursive'
          fetch-depth: 0

      # 3. Java設定（Node 24対応最新版）
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. NDK設定（r28b）
      - name: Setup Android NDK (r28b)
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r28b
          add-to-path: true

      # 5. 依存関係のインストール
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            automake ant autopoint cmake build-essential \
            libtool libtool-bin libltdl-dev m4 \
            patch pkg-config protobuf-compiler ragel subversion unzip git \
            flex python3 wget gperf nasm ccache meson ninja-build bison gawk gettext

      # 6. 環境構築
      - name: Setup Build Environment
        run: |
          NDK_ACTUAL_PATH="${{ steps.setup-ndk.outputs.ndk-path }}"
          sudo ln -sfn "$NDK_ACTUAL_PATH" "$ANDROID_SDK_ROOT/ndk-bundle"
          
          echo "ANDROID_SDK=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk-bundle" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk-bundle" >> $GITHUB_ENV

      # 7A. Gradleキャッシュ（Node 24対応最新版）
      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 7B. ccacheキャッシュ（Node 24対応最新版）
      - name: ccache cache
        uses: actions/cache@v5
        with:
          path: /home/runner/.cache/ccache
          key: vlc-ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            vlc-ccache-${{ runner.os }}-

      # 8. ビルド実行 (オプションを修正し、文法エラーを解消)
      - name: Build VLC for Android (ARM64)
        run: |
          # --- 1. Gitインフラ設定 ---
          git config --global user.email "worker@example.com"
          git config --global user.name "VLC Builder"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          # --- 2. スクリプトのパス解決 ---
          if [ -f "./buildsystem/compile.sh" ]; then
            SCRIPT_PATH="./buildsystem/compile.sh"
          else
            SCRIPT_PATH="./compile.sh"
          fi
          echo "Using script at: $SCRIPT_PATH"

          # --- 3. 実行権限の付与 ---
          chmod +x "$SCRIPT_PATH"
          find . -name gradlew -exec chmod +x {} + || true

          # --- 4. ビルド実行 ---
          # --no-checksums を削除。標準的な -a (arch) と -r (release) のみに修正。
          $SCRIPT_PATH -a arm64-v8a -r || { echo "Build failed with exit code $?"; exit 1; }
          
      # 8.5 署名工程の修正（GitHub Secretsを利用した鍵の固定化）
      - name: Sign APK with Repository Secrets
        run: |
          # 1. Android Build-Tools のパスを特定
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -1)
          
          # 2. GitHub Secrets から Keystore ファイルを復元 (Base64デコード)
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > release.keystore
          
          # 3. 未署名、または既存の APK を探して署名する
          # VLCの出力名に合わせて柔軟に検索します
          find application/app/build/outputs/apk/release/ -name "*.apk" | while read raw_apk; do
            # 署名後のファイル名を定義
            signed_apk="vlc-android-custom-signed.apk"
            
            echo "Signing $raw_apk..."
            
            # 4. apksigner による署名実行 (V2/V3署名を適用)
            # ※ zipalignは最近のGradleビルドでは自動で行われているため、直接apksignerを実行するのが安全です
            $BUILD_TOOLS_DIR/apksigner sign --ks release.keystore \
              --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
              --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
              --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
              --out "$signed_apk" \
              "$raw_apk"
              
            echo "Successfully signed: $signed_apk"
            
            # 検証ログを出力（インフラSEのデバッグ用）
            $BUILD_TOOLS_DIR/apksigner verify --verbose --print-certs "$signed_apk"
          done

      # 9. 署名済みAPKをArtifactとして保存
      - name: Upload Signed APK
        uses: actions/upload-artifact@v6
        with:
          name: vlc-custom-signed
          path: vlc-android-custom-signed.apk

      # 10. GitHub Releasesへの自動配送
      - name: Automatic Release Service
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') # タグが打たれた時だけ実行
        with:
          files: |
            **/*.apk
          name: "VLC Custom Build ${{ github.ref_name }}"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
