name: Build VLC-Android (Released Node 24 Actions & Official Env)

on:
  push:
    branches: [ stable-custom, master, main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      USE_CCACHE: "1"
      CCACHE_DIR: "/home/runner/.cache/ccache"
      # 公式Dockerfileから判明した安定版用リビジョン
      ANDROID_NDK_REVISION: "28.2.13676358"
      ANDROID_SDK_TOOLS: "36.0.0"
      ANDROID_API: "36"

    steps:
      # 1. インフラ強化（12GB Swap）
      - name: Allocate Massive Swap (12GB)
        run: |
          sudo fallocate -l 12G /swapfile_vlc || sudo dd if=/dev/zero of=/swapfile_vlc bs=1M count=12288
          sudo chmod 600 /swapfile_vlc
          sudo mkswap /swapfile_vlc
          sudo swapon /swapfile_vlc
          free -h

      # 2. ソース取得 (Node 24対応リリース済み v6)
      - name: Checkout Source
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          fetch-depth: 0

      # 3. Java設定 (Node 24対応リリース済み v5)
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. Rust設定 (最新VLCビルドに必須)
      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, x86_64-linux-android

      # 5. 依存関係のインストール
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            automake ant autopoint cmake build-essential \
            libtool libtool-bin libltdl-dev m4 \
            patch pkg-config protobuf-compiler ragel subversion unzip git \
            flex python3 wget gperf nasm ccache meson ninja-build bison gawk gettext

      # 6. 環境構築 (NDK r28c & LLVMパス設定)
      - name: Setup Android SDK & NDK r28c
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
            "build-tools;${{ env.ANDROID_SDK_TOOLS }}" \
            "platforms;android-${{ env.ANDROID_API }}" \
            "ndk;${{ env.ANDROID_NDK_REVISION }}"
          
          NDK_PATH="$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_REVISION }}"
          echo "ANDROID_NDK=$NDK_PATH" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      # 7. キャッシュ設定 (Node 24対応リリース済み v5)
      - name: Cache Gradle & ccache
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            /home/runner/.cache/ccache
          key: vlc-build-stable-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            vlc-build-stable-${{ runner.os }}-

      # 8. ビルド実行
      - name: Build VLC for Android
        run: |
          git config --global user.email "worker@example.com"
          git config --global user.name "VLC Builder"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          chmod +x ./buildsystem/compile.sh
          ./buildsystem/compile.sh -a arm64-v8a -r

      # 8.5 署名工程 (1Password連携鍵)
      - name: Sign APK with Repository Secrets
        run: |
          BUILD_TOOLS_DIR="$ANDROID_HOME/build-tools/${{ env.ANDROID_SDK_TOOLS }}"
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > release.keystore
          
          RAW_APK=$(find application/app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          echo "Signing $RAW_APK..."
          
          $BUILD_TOOLS_DIR/apksigner sign --ks release.keystore \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --out vlc-3.7.0-custom-signed.apk \
            "$RAW_APK"
          
          $BUILD_TOOLS_DIR/apksigner verify --verbose vlc-3.7.0-custom-signed.apk

      # 9. Artifact保存 (Node 24対応リリース済み v6)
      - name: Upload Signed APK
        uses: actions/upload-artifact@v6
        with:
          name: vlc-android-3.7.0-signed
          path: vlc-3.7.0-custom-signed.apk

      # 10. Release配送 (最新版 v2)
      - name: Automatic Release Service
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: vlc-3.7.0-custom-signed.apk
          name: "VLC Custom Build ${{ github.ref_name }}"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
