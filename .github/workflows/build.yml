name: Build VLC (Precision Implementation v2.3 - Success Strike)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 初回完走を最優先し、メモリ消費を抑えるため並列数を1に制限
      MAKEFLAGS: "-j1"
      USE_CCACHE: "1"
      CCACHE_DIR: "/home/runner/.cache/ccache"
      # Gradleがデーモンで居座りメモリを食い潰すのを防止
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false"

    steps:
      # 【インフラ強化】物理メモリの壁を超えるため12GBのSwapを確保
      - name: Allocate Massive Swap (12GB)
        run: |
          sudo fallocate -l 12G /swapfile_vlc || sudo dd if=/dev/zero of=/swapfile_vlc bs=1M count=12288
          sudo chmod 600 /swapfile_vlc
          sudo mkswap /swapfile_vlc
          sudo swapon /swapfile_vlc
          free -h

      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 【修正】ビルドシステムの要求に従い r27 を使用
      - name: Setup Android NDK (r27)
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27
          add-to-path: true

      - name: Install Wiki Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y automake ant autopoint cmake build-essential libtool-bin \
            patch pkg-config protobuf-compiler ragel subversion unzip git \
            flex python3 wget gperf nasm ccache meson ninja-build bison gawk gettext

      - name: Setup Wiki Build Environment
        run: |
          echo "ANDROID_SDK=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

      - name: ccache cache
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/ccache
          key: vlc-ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            vlc-ccache-${{ runner.os }}-

      - name: Build VLC for Android (ARM64)
        run: |
          git config --global user.email "worker@example.com"
          git config --global user.name "VLC Builder"
          
          # スクリプト特定と権限付与
          SCRIPT_PATH=$(find . -name compile.sh | head -n 1)
          chmod +x "$SCRIPT_PATH"
          find . -name gradlew -exec chmod +x {} + || true
          
          # 実行
          $SCRIPT_PATH -a arm64-v8a -r

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vlc-custom-apk
          path: "**/*.apk"
