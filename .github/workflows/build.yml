name: Build VLC (Precision Implementation v2.5 - Final Master)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # メモリ不足(OOM)を徹底的に防ぐため並列数を1に制限
      MAKEFLAGS: "-j1"
      USE_CCACHE: "1"
      CCACHE_DIR: "/home/runner/.cache/ccache"
      # Gradleのメモリ消費を2GBに抑え、デーモンを無効化
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false"

    steps:
      # 1. インフラ強化：12GBのSwapを確保して物理メモリの限界を突破
      - name: Allocate Massive Swap (12GB)
        run: |
          sudo fallocate -l 12G /swapfile_vlc || sudo dd if=/dev/zero of=/swapfile_vlc bs=1M count=12288
          sudo chmod 600 /swapfile_vlc
          sudo mkswap /swapfile_vlc
          sudo swapon /swapfile_vlc
          free -h

      # 2. ソース取得：あなたの改造コードと依存サブモジュールを全て取得
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      # 3. Java設定：Gradle 9系が要求するJDK 17を導入
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. NDK設定：r27を導入し、パスを自動取得
      - name: Setup Android NDK (r27)
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27
          add-to-path: true

      # 5. 依存関係：最新のエラー（Libtool/m4）対策を含め全てインストール
      - name: Install Wiki & Contrib Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            automake ant autopoint cmake build-essential \
            libtool libtool-bin libltdl-dev m4 \
            patch pkg-config protobuf-compiler ragel subversion unzip git \
            flex python3 wget gperf nasm ccache meson ninja-build bison gawk gettext

      # 6. 環境構築：VLCスクリプトを「ndk-bundle」という偽のパスで騙す
      - name: Setup Build Environment (Symlink Fix)
        run: |
          NDK_ACTUAL_PATH="${{ steps.setup-ndk.outputs.ndk-path }}"
          sudo ln -sfn "$NDK_ACTUAL_PATH" "$ANDROID_SDK_ROOT/ndk-bundle"
          
          echo "ANDROID_SDK=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk-bundle" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk-bundle" >> $GITHUB_ENV

      # 7. キャッシュ：ビルド時間を短縮するためのccache設定
      - name: ccache cache
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/ccache
          key: vlc-ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            vlc-ccache-${{ runner.os }}-

      # 8. ビルド実行：改造されたあなたのコードをコンパイル
      - name: Build VLC for Android (ARM64)
        run: |
          git config --global user.email "worker@example.com"
          git config --global user.name "VLC Builder"
          
          SCRIPT_PATH=$(find . -name compile.sh | head -n 1)
          chmod +x "$SCRIPT_PATH"
          # 全てのgradlewに権限を付与
          find . -name gradlew -exec chmod +x {} + || true
          
          # Dimensity 9500向けに最適化
          $SCRIPT_PATH -a arm64-v8a -r

      # 9. 成果物：完成したAPKをアップロード
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vlc-custom-apk
          path: "**/*.apk"
