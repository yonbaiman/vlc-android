name: Build Custom VLC for Dimensity 9500

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # VLC公式の最新ビルド環境
    container: registry.videolan.org/vlc-debian-android

    steps:
      - name: Checkout Source
        # 動作実績あり：Node.js 24対応
        uses: actions/checkout@v6

      - name: Build Custom VLC APK
        run: |
          chmod +x compile.sh
          # Dimensity 9500 (ARM64) 向けリリースビルド
          ./compile.sh -a arm64-v8a -r

      - name: Upload Custom APK
        # 動作実績あり：最新アーティファクト処理
        uses: actions/upload-artifact@v7
        with:
          name: vlc-custom-nplayer-style
          path: application/vlc-android/build/outputs/apk/release/*.apk
