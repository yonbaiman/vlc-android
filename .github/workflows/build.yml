name: Build VLC (Free Tier Optimized)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 【インフラ最適化1】 OOM(メモリ不足)対策としてSwap領域を8GB追加（競合対策・堅牢化版）
      - name: Allocate Swap Space
        run: |
          echo "Current memory and swap status:"
          free -h
          
          # システム既存の /swapfile との競合を避けるため、独自ファイル名で作成
          # fallocateが失敗した場合はddコマンドで確実に作成するフェイルオーバーを実装
          sudo fallocate -l 8G /swapfile_vlc || sudo dd if=/dev/zero of=/swapfile_vlc bs=1M count=8192 status=progress
          
          sudo chmod 600 /swapfile_vlc
          sudo mkswap /swapfile_vlc
          sudo swapon /swapfile_vlc
          
          echo "New memory and swap status:"
          free -h

      # 【修正箇所】 VLC本体など、依存するサブモジュールも全て再帰的に取得する
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 【インフラ最適化2】 依存関係に最新のビルドツールとccacheを追加
      - name: Install Official Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y automake ant autopoint cmake build-essential libtool-bin \
            patch pkg-config protobuf-compiler ragel sub
