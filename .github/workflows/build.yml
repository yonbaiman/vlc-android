name: Build Custom VLC (Native Runner Mode)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    # Dockerを使わず、GitHubの最新Ubuntu環境で直接ビルドする
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Build Dependencies
        # VLCのコンパイルに必要なLinuxツール群を一括インストール
        run: |
          sudo apt-get update
          sudo apt-get install -y automake ant autopoint cmake build-essential libtool-bin \
            patch pkg-config protobuf-compiler ragel subversion unzip wget git \
            nasm execstack

      - name: Build Custom VLC APK
        # GitHub Runnerには最初からAndroid SDKが設定されているので、そのまま叩ける
        run: |
          chmod +x buildsystem/compile.sh
          # Dimensity 9500向けARM64、リリースビルド
          ./buildsystem/compile.sh -a arm64-v8a -r

      - name: Upload Custom APK
        uses: actions/upload-artifact@v7
        with:
          name: vlc-custom-nplayer-style
          path: application/vlc-android/build/outputs/apk/release/*.apk
          if-no-files-found: error
