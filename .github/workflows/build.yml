name: Build VLC-Android (Custom)

on:
  push:
    branches: [ stable-custom ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      USE_CCACHE: "1"
      CCACHE_DIR: "/home/runner/.cache/ccache"
      ANDROID_NDK_REVISION: "28.2.13676358"
      ANDROID_SDK_TOOLS: "36.0.0"
      ANDROID_API: "36"

    steps:
      # 1. ストレージの最適化
      - name: Maximize Storage and Setup Swap on mnt
        run: |
          # Android SDK以外を削除して容量を確保
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
          
          # Swapを /mnt (Azure一時ディスク) に作成
          sudo fallocate -l 8G /mnt/swapfile_vlc || sudo dd if=/dev/zero of=/mnt/swapfile_vlc bs=1M count=8192
          sudo chmod 600 /mnt/swapfile_vlc
          sudo mkswap /mnt/swapfile_vlc
          sudo swapon /mnt/swapfile_vlc
          
          echo "=== Optimized Disk Space ==="
          df -h
          free -h

      # 2. ソース取得 (Node 24対応 v6)
      - name: Checkout Source
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          fetch-depth: 0

      # 3. Java設定 (Node 24対応 v5)
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. Rust設定 (ターゲット追加)
      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, x86_64-linux-android

      # 5. 依存関係のインストール
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            automake ant autopoint cmake build-essential \
            libtool libtool-bin libltdl-dev m4 \
            patch pkg-config protobuf-compiler ragel subversion unzip git \
            flex python3 wget gperf nasm ccache meson ninja-build bison gawk gettext

      # 6. 環境構築
      - name: Setup Android SDK & NDK
        run: |
          # 確実に sdkmanager のパスを特定
          SDK_MANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          echo "Using sdkmanager at: $SDK_MANAGER"
          
          echo "y" | $SDK_MANAGER --install "ndk;${{ env.ANDROID_NDK_REVISION }}"
          
          SDK_PATH="$ANDROID_HOME"
          NDK_PATH="$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_REVISION }}"
          
          sudo ln -sfn "$NDK_PATH" "$SDK_PATH/ndk-bundle"
          
          echo "ANDROID_SDK=$SDK_PATH" >> $GITHUB_ENV
          echo "ANDROID_NDK=$SDK_PATH/ndk-bundle" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$SDK_PATH/ndk-bundle" >> $GITHUB_ENV
          echo "$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Cache Gradle & ccache
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            /home/runner/.cache/ccache
          key: vlc-build-stable-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            vlc-build-stable-${{ runner.os }}-

      - name: Build VLC for Android
        run: |
          git config --global user.email "worker@example.com"
          git config --global user.name "VLC Builder"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          chmod +x ./buildsystem/compile.sh
          ./buildsystem/compile.sh -a arm64-v8a -r

      - name: Sign APK
        run: |
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/${{ env.ANDROID_SDK_TOOLS }} | head -n 1)
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > release.keystore
          RAW_APK=$(find application/app/build/outputs/apk/release/ -name "*arm64-v8a*.apk" | head -n 1)
          $BUILD_TOOLS_DIR/apksigner sign --ks release.keystore \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --out vlc-3.7.0-custom-signed.apk \
            "$RAW_APK"
          $BUILD_TOOLS_DIR/apksigner verify --verbose vlc-3.7.0-custom-signed.apk

      - name: Upload Signed APK
        uses: actions/upload-artifact@v6
        with:
          name: vlc-android-3.7.0-signed
          path: vlc-3.7.0-custom-signed.apk

      - name: Automatic Release Service
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: vlc-3.7.0-custom-signed.apk
          name: "VLC Custom Build ${{ github.ref_name }}"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
