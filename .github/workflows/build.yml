name: Build VLC (Wiki Precision Implementation v2.1)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MAKEFLAGS: "-j2" # メモリ消費抑制（OOM対策）
      USE_CCACHE: "1"
      CCACHE_DIR: "/home/runner/.cache/ccache"

    steps:
      - name: Allocate Swap (8GB)
        run: |
          sudo fallocate -l 8G /swapfile_vlc || sudo dd if=/dev/zero of=/swapfile_vlc bs=1M count=8192
          sudo chmod 600 /swapfile_vlc
          sudo mkswap /swapfile_vlc
          sudo swapon /swapfile_vlc

      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 【v2の優れた点】公式ツールで確実にNDKをセットアップ
      - name: Setup Android NDK (v27)
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27
          add-to-path: true

      - name: Install Wiki Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y automake ant autopoint cmake build-essential libtool-bin \
            patch pkg-config protobuf-compiler ragel subversion unzip git \
            flex python3 wget gperf nasm ccache meson ninja-build bison gawk gettext

      - name: Setup Wiki Build Environment
        run: |
          # setup-ndkが提供するパスを環境変数に確実に代入
          echo "ANDROID_SDK=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

      - name: ccache cache
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/ccache
          key: vlc-ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            vlc-ccache-${{ runner.os }}-

      - name: Build VLC for Android (ARM64)
        run: |
          git config --global user.email "worker@example.com"
          git config --global user.name "VLC Builder"
          
          SCRIPT_PATH=$(find . -name compile.sh | head -n 1)
          # ↓ これを追加しておくと、Gradle 周りの権限エラーを完全に封殺できます
          find . -name gradlew -exec chmod +x {} + || true
          
          chmod +x "$SCRIPT_PATH"
          $SCRIPT_PATH -a arm64-v8a -r

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vlc-android-apk
          path: "**/*.apk"
