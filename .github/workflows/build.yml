name: Build Custom VLC for Dimensity 9500

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v6

      - name: Build Custom VLC APK inside Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            registry.videolan.org/vlc-debian-android \
            bash -c "chmod +x buildsystem/compile.sh && ./buildsystem/compile.sh -a arm64-v8a -r"

      - name: Upload Custom APK
        uses: actions/upload-artifact@v7
        with:
          name: vlc-custom-nplayer-style
          path: application/vlc-android/build/outputs/apk/release/*.apk
          if-no-files-found: error
